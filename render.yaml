services:
  - type: web
    name: autoflow-backend
    runtime: python
    rootDir: .
    buildCommand: bash build.sh
    startCommand: bash start.sh
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.production
      - key: DJANGO_DEBUG
        value: "false"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DB_CONN_MAX_AGE
        value: "60"
      - key: DB_SSL_REQUIRE
        value: "true"
      - key: DJANGO_ALLOWED_HOSTS
        sync: false
      - key: DJANGO_CORS_ALLOWED_ORIGINS
        sync: false
      - key: DJANGO_CSRF_TRUSTED_ORIGINS
        sync: false
      - key: FRONTEND_BASE_URL
        sync: false
      - key: BACKEND_PUBLIC_URL
        sync: false
      - key: MERCADOPAGO_NOTIFICATION_URL
        sync: false
